<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>鯖主サバイバル</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="game">

    <!-- タイトル -->

    <h1>🎮 鯖主サバイバル</h1>

    <!-- ステータス -->

    <div class="status">

        <div class="box">

            ❤️<br>

            <span id="mental">15</span>

            <br>

            メンタル

        </div>

        <div class="box">

            🤝<br>

            <span id="trust">15</span>

            <br>

            トラスト

        </div>

        <div class="box">

            👥<br>

            <span id="members">30</span>

            <br>

            メンバー

        </div>

        <div class="box">

            📅<br>

            <span id="day">1</span>

            <br>

            Day

        </div>

    </div>


    <!-- イベント -->

    <div class="event">

        <h2 id="eventTitle">

            イベントタイトル

        </h2>

        <p id="eventText">

            ここにイベント内容が表示されます。

        </p>

    </div>


    <!-- 選択肢 -->

    <div class="choices">

        <button id="choice1">

            選択肢１

        </button>

        <button id="choice2">

            選択肢２

        </button>

        <button id="choice3">

            選択肢３

        </button>

    </div>


    <!-- 結果 -->

    <div class="result">

        <h3>

            結果

        </h3>

        <p id="resultText">

            ここに結果が表示されます。

        </p>

    </div>

</div>


<script src="data/events.js"></script>

<script src="script.js"></script>

</body>

</html>
