<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>あなたはどんな鯖主？ | 鯖主サバイバル</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="game">

    <h1>🛡 あなたはどんな鯖主？</h1>

    <p class="subtitle">

        ゲーム開始前に、あなたの運営スタイルを診断します。<br>
        正解・不正解はありません。<br>
        思った通りに答えてください。

    </p>

    <!-- ========================= -->
    <!-- 質問エリア -->
    <!-- ========================= -->

    <div id="questionArea">

    </div>

    <br>

    <!-- ========================= -->
    <!-- 長所 -->
    <!-- ========================= -->

    <h2>🌟 長所（3つ選んでください）</h2>

    <div id="strengthArea">

    </div>

    <br>

    <!-- ========================= -->
    <!-- 短所 -->
    <!-- ========================= -->

    <h2>⚠️ 短所（3つ選んでください）</h2>

    <div id="weaknessArea">

    </div>

    <br><br>

    <!-- ========================= -->
    <!-- 診断ボタン -->
    <!-- ========================= -->

    <div id="diagnosisButtonArea">

        <button id="diagnosisButton">

            📊 診断する

        </button>

    </div>


    <!-- ========================= -->
    <!-- 診断結果 -->
    <!-- ========================= -->

    <div id="resultArea" style="display:none;">

        <hr>

        <h2>📊 診断結果</h2>

        <h3 id="serverType">

            鯖主タイプ

        </h3>

        <p>

            ❤️ メンタル

            <strong id="mentalResult">15</strong>

        </p>

        <p>

            🤝 メンバーからの信頼

            <strong id="trustResult">15</strong>

        </p>

        <br>

        <button id="startGameButton">

            🎮 GAME START

        </button>

    </div>

</div>


<script src="data/questions.js"></script>

<script src="script.js"></script>

</body>

</html>
