<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>あなたはどんな鯖主？ | 鯖主サバイバル</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="game">

    <h1>🛡️ あなたはどんな鯖主？</h1>

    <p class="subtitle">

        ゲーム開始前に、あなたの運営スタイルを診断します。<br>
        正解・不正解はありません。<br>
        あなたならどうするか、素直な気持ちで答えてください。

    </p>

    <!-- 質問表示エリア -->

    <div id="questionArea">

        <!-- questions.jsから自動表示 -->

    </div>

    <br>

    <h2>🌟 あなたの長所（3つまで選択）</h2>

    <div id="strengthArea">

        <!-- questions.jsから自動表示 -->

    </div>

    <br>

    <h2>⚠️ あなたの短所（3つまで選択）</h2>

    <div id="weaknessArea">

        <!-- questions.jsから自動表示 -->

    </div>

    <br><br>

    <div style="text-align:center;">

        <button id="startGame">

            🎮 鯖主サバイバルを始める

        </button>

    </div>

</div>

<script src="data/questions.js"></script>

<script src="script.js"></script>

</body>

</html>
