<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>鯖主サバイバル</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="game">

    <!-- タイトル -->

    <h1>🎮 鯖主サバイバル</h1>

    <p class="subtitle">
        Discordコミュニティ運営シミュレーション
    </p>


    <!-- ステータス -->

    <div class="status">

        <div class="box">
            ❤️<br>
            <span id="mental"></span><br>
            メンタル
        </div>

        <div class="box">
            🤝<br>
            <span id="trust"></span><br>
            トラスト
        </div>

        <div class="box">
            👥<br>
            <span id="members"></span><br>
            メンバー
        </div>

        <div class="box">
            📅<br>
            <span id="day"></span><br>
            Day
        </div>

    </div>


    <!-- 質問・イベントタイトル -->

    <div class="event">

        <h2 id="eventTitle"></h2>

        <p id="eventText"></p>

    </div>


    <!-- 選択肢 -->

    <div class="choices">

        <button id="choice1"></button>

        <button id="choice2"></button>

        <button id="choice3"></button>

    </div>


    <!-- 結果表示 -->

    <div class="result">

        <h3>結果</h3>

        <p id="resultText"></p>

    </div>

</div>


<script src="data/questions.js"></script>

<script src="data/events.js"></script>

<script src="script.js"></script>

</body>

</html>
